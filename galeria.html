    <!-- Open Graph / Redes Sociales -->

    <meta property="og:title" content="Galería | Javier Fernández Ramos Fotógrafo">

        content="Explora todas las colecciones y últimos trabajos fotográficos de Javier Fernández Ramos.">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .gallery-page-header {
            padding-top: 120px;
            text-align: center;
        }

        .categories-menu-wrapper {
            text-align: center;
            width: 100%;
        }

        .categories-menu {
            display: inline-flex;
            justify-content: flex-start;
            max-width: 100%;
            gap: 1rem;
            padding: 2rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
            overflow-x: auto;
            white-space: nowrap;
            /* Scrollbar Firefox */
            scrollbar-color: rgba(197, 160, 89, 0.7) rgba(255, 255, 255, 0.03);
            scrollbar-width: thin;
        }

        /* Scrollbar Webkit (Chrome/Safari/Edge) */
        .categories-menu::-webkit-scrollbar {
            height: 6px;
        }

        .categories-menu::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .categories-menu::-webkit-scrollbar-thumb {
            background: rgba(197, 160, 89, 0.7);
            border-radius: 10px;
        }

        .categories-menu::-webkit-scrollbar-thumb:hover {
            background: var(--color-gold);
        }

        .categories-menu a {
            flex: 0 0 auto;
            padding: 0.7rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            color: var(--color-text-light);
            background: rgba(255, 255, 255, 0.02);
        }

        .categories-menu a:hover,
        .categories-menu a.active {
            border-color: var(--color-gold);
            color: #000;
            background: var(--color-gold);
        }

        #photo-grid-container {
            min-height: 50vh;
        }

        @media (max-width: 768px) {
            .categories-menu {
                justify-content: flex-start;
                padding-bottom: 1.5rem;
                gap: 0.6rem;
                /* Menos espacio entre botones */
            }

            .categories-menu a {
                padding: 0.5rem 1rem;
                /* Botones más pequeños */
                font-size: 0.75rem;
                /* Texto más pequeño */
            }
        }
    </style>

</head>

<body>
    <div id="loader">

        <section id="photo-grid-container" class="gallery-grid section-padding">

    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <button id="lightbox-prev" class="lightbox-nav prev" aria-label="Foto anterior"><i
                class="fas fa-chevron-left"></i></button>
        <img class="lightbox-content" id="lightbox-img">
        <button id="lightbox-next" class="lightbox-nav next" aria-label="Foto siguiente"><i
                class="fas fa-chevron-right"></i></button>
        <div class="swipe-hint">
            <div class="hint-top"></div>
            <span class="hint-text">Desliza para navegar</span>
            <div class="hint-bottom"></div>
        </div>
    </div>
