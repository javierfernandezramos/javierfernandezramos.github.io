<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviPhoto - Vídeos</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="canonical" href="https://javiphoto.es/videos" />

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- NAVBAR MÓVIL Y DESKTOP -->
    <header id="navbar" class="scrolled">
        <div class="container">
            <a href="index.html" class="logo">JaviPhoto</a>
            <button class="menu-toggle" id="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </button>
            <nav class="nav-links" id="nav-links">
                <a href="index.html">Inicio</a>
                <a href="galeria.html">Galería</a>
                <a href="videos.html">Vídeos</a>
                <!-- Resto de links ocultos por si vas al index, aunque en videos.html te redirijan -->
                <a href="index.html#servicios">Servicios</a>
                <a href="index.html#contacto">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="container">

        <header class="videos-page-header reveal">
            <h1 class="section-title">Film & Video</h1>
            <p class="videos-subtitle">Behind The Scenes & Oficiales</p>
        </header>

        <section class="videos-grid reveal">

            <!-- VÍDEO 1 -->
            <div class="video-card">
                <div style="position:relative;padding-top:177.77%;">
                    <iframe
                        src="https://player.mediadelivery.net/embed/640795/2c525299-3da1-4371-b640-667330e70a08?autoplay=false"
                        loading="lazy" style="border:0;position:absolute;top:0;height:100%;width:100%;"
                        allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;"
                        allowfullscreen="true"></iframe>
                </div>
                <div class="video-label">Video de Marca</div>
            </div>

            <!-- VÍDEO 2 -->
            <div class="video-card">
                <div style="position:relative;padding-top:177.77%;">
                    <iframe
                        src="https://player.mediadelivery.net/embed/640795/734f90b7-9645-49db-9d9a-ed72a9e385f5?autoplay=false"
                        loading="lazy" style="border:0;position:absolute;top:0;height:100%;width:100%;"
                        allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;"
                        allowfullscreen="true"></iframe>
                </div>
                <div class="video-label">Behind the scenes</div>
            </div>

            <!-- VÍDEO 3 -->
            <div class="video-card">
                <div style="position:relative;padding-top:177.77%;">
                    <iframe
                        src="https://player.mediadelivery.net/embed/640795/018f5325-ad69-4889-960f-1a12f0812395?autoplay=false"
                        loading="lazy" style="border:0;position:absolute;top:0;height:100%;width:100%;"
                        allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture;"
                        allowfullscreen="true"></iframe>
                </div>
                <div class="video-label">Contenido Fitness</div>
            </div>

        </section>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Javier Fernández Ramos. Todos los derechos reservados.</p>
        </div>
    </footer>

    <!-- LIGHTBOX (Por si se recicla código, aunque para videos se usan sus propios reproductores) -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
    </div>

    <script src="script.js"></script>
</body>

</html>
