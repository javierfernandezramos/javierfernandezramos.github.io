name: Optimize Images

on:
  push:
    branches:
      - main
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write # Permite al bot subir los cambios al repositorio

jobs:
  build:
    name: calibreapp/image-actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Resize & Convert to WebP
        run: |
          # Convertir todas las imágenes a WebP (max 1798px) y borrar originales
          find src/assets/Fotos/ -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | while read -r img; do
            echo "Processing $img..."
            # Convertir a webp con calidad 80 y redimensionar
            convert "$img" -resize '1798x1798>' "${img%.*}.webp"
            rm "$img"
          done

      - name: Compress Everything
        uses: calibreapp/image-actions@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          compressOnly: true
          jpegQuality: '75'
          pngQuality: '75'
          webpQuality: '75'
          ignorePaths: 'node_modules/**,dist/**'

      - name: Auto Commit Optimized Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Optimize images (resize & thumbnails) [skip ci]"
